# This workflow will install Python dependencies, run tests and lint with a single version of Python
# For more information see: https://docs.github.com/en/actions/automating-builds-and-tests/building-and-testing-python

name: AI Contract Review CI

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

permissions:
  contents: read

jobs:
  build:
    runs-on: ubuntu-latest
    env:
      GROQ_API_KEY: ${{ secrets.GROQ_API_KEY }}
      AWS_ACCESS_KEY_ID: ${{ secrets.AWS_ACCESS_KEY_ID }}
      AWS_SECRET_ACCESS_KEY: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
      AWS_REGION: ${{ secrets.AWS_REGION }}
      AWS_S3_ENDPOINT_URL: ${{ secrets.AWS_S3_ENDPOINT_URL }}
      GROQ_MODEL: ${{ secrets.GROQ_MODEL }}

    steps:
      # 1. سحب كود المشروع
      - name: Checkout repository
        uses: actions/checkout@v4

      # 2. إعداد بيئة بايثون (تطابق الإصدار لديك، مثلاً 3.13)
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.13"
          cache: 'pip'

      # 3. تثبيت المكتبات المطلوبة
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          if [ -f app/ai-contract-review/requirements.txt ]; then pip install -r app/ai-contract-review/requirements.txt; fi

      # 4. تشغيل الاختبارات أو التحقق من الكود (إذا كان لديك pytest مثلاً)
      - name: Run Tests
        run: |
          # أضف أمر الاختبارات هنا، أو اتركها متخطية لو لم تكتب Tests بعد
          echo "No tests configured yet, skipping..."
